<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="35%" stop-color="#FDE047" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="52%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="65%" stop-color="#FDE047" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="148" fill="none" stroke="#FDE047" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="112" fill="none" stroke="#FDE047" stroke-width="3" opacity="0.3"/>

  <g transform="rotate(45, 256, 256)">
    <polygon points="12,256 256,236 500,256 256,276" fill="url(#beamGrad)" filter="url(#coreGlow)"/>
    <polygon points="28,256 256,251 484,256 256,261" fill="#FFFFFF"/>
  </g>

  <circle cx="256" cy="256" r="56" fill="#FDE047" filter="url(#coreGlow)"/>
  
  <circle cx="256" cy="256" r="44" fill="#FFFFFF"/>
</svg>